#include <WiFi.h>
#include "esp_http_server.h"

const char* ssid = "esp32";
const char* password = "12345678";

const int M1_IN1 = 12;
const int M1_IN2 = 13;

const int PULSE_TIME = 75;

volatile int motorCommand = 0;

httpd_handle_t server_httpd = NULL;

const char index_html[] PROGMEM = R"rawliteral(
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gurhh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ececec;
        }

        section {
            width: 60vw;
            max-width: 400px;
            border-width: 5px;
            border-style: solid;
            border-color: #74af30;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #topPart {
            width: 100%;
            background-color: #74af30;
            color: white;
            font-size: 26px;
            font-weight: 600;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            letter-spacing: 1px;
            box-sizing: border-box;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 300px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Trebuchet MS', sans-serif;
            transition: all 0.2s;
            background-color: #74af30;
        }

        button:hover { background-color: #5f9126; }
        button:active { transform: translateY(3px); }

        #status {
            margin-top: 10px;
            font-family: 'Trebuchet MS', sans-serif;
            color: #666;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
<section>
    <div id="topPart">Motor Operator</div>
    <div id="mainContent">
        <div class="controls">
            <button onclick="move('fwd')">&#8635; Close Hatch</button>
            <button onclick="move('rev')">&#8634; Open Hatch</button>
            <div id="status">System Ready</div>
        </div>
    </div>
</section>

<script>
    function move(dir) {
        const status = document.getElementById('status');
        status.innerText = "Sending command...";

        fetch('/motor?dir=' + dir + '&t=' + Date.now())
            .then(() => {
                status.innerText = "Success: Motor moving " + dir;
                setTimeout(() => {
                    if (status.innerText.includes("Success")) {
                        status.innerText = "System Ready";
                    }
                }, 2000);
            })
            .catch(err => {
                status.innerText = "Error reaching device!";
                console.error(err);
            });
    }
</script>
</body>
</html>
)rawliteral";



esp_err_t index_handler(httpd_req_t *req) {
  httpd_resp_set_type(req, "text/html");
  return httpd_resp_send(req, index_html, strlen(index_html));
}

esp_err_t motor_handler(httpd_req_t *req) {
  char query[32] = {0};
  char dir[8] = {0};

  if (httpd_req_get_url_query_str(req, query, sizeof(query)) == ESP_OK) {
    httpd_query_key_value(query, "dir", dir, sizeof(dir));
  }

  if (strcmp(dir, "fwd") == 0)      motorCommand = 1;
  else if (strcmp(dir, "rev") == 0) motorCommand = -1;


  httpd_resp_set_type(req, "text/plain");
  return httpd_resp_send(req, "ok", 2);
}

void startServer() {
  httpd_config_t config = HTTPD_DEFAULT_CONFIG();
  config.server_port = 80;
  config.max_open_sockets = 5;
  config.lru_purge_enable = true;

  httpd_uri_t index_uri = { .uri = "/", .method = HTTP_GET, .handler = index_handler, .user_ctx = NULL };
  httpd_uri_t motor_uri = { .uri = "/motor", .method = HTTP_GET, .handler = motor_handler, .user_ctx = NULL };

  if (httpd_start(&server_httpd, &config) == ESP_OK) {
    httpd_register_uri_handler(server_httpd, &index_uri);
    
    httpd_register_uri_handler(server_httpd, &motor_uri);
  }
  
}







void setup() {
  Serial.begin(115200);

  pinMode(M1_IN1, OUTPUT);
  pinMode(M1_IN2, OUTPUT);
  digitalWrite(M1_IN1, LOW);
  digitalWrite(M1_IN2, LOW);

  WiFi.softAP(ssid, password);
  startServer();
}

void loop() {
  if (motorCommand != 0) {
    int cmd = motorCommand;
    motorCommand = 0;

    if (cmd == 1) {
      digitalWrite(M1_IN1, HIGH); digitalWrite(M1_IN2, LOW);
    } else if (cmd == -1) {
      digitalWrite(M1_IN1, LOW);  digitalWrite(M1_IN2, HIGH);
    }

    delay(PULSE_TIME);

    digitalWrite(M1_IN1, LOW);
    digitalWrite(M1_IN2, LOW);
  }
  delay(10);
}
