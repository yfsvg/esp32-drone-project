            display: flex;

            align-items: center;
            height: 100vh;

        section {
            width: 90vw;
            height: 90vh;
            border-width: 5px;
            border-style: solid;
            border-color: #74af30;

            font-weight: 600;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
    </style>
</head>
<body>

<section>
    <div id="topPart">
        Drone Feed + Motor Operator
    </div>

    <div style="display: flex;">

</section>

</html>
